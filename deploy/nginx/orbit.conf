map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name shawnstronger.cloud www.shawnstronger.cloud 123.56.29.242;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        allow all;
    }

    location / {
        return 308 https://shawnstronger.cloud$request_uri;
    }
}

server {
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    server_name shawnstronger.cloud;
    client_max_body_size 110m;

    location = /api/ping {
        proxy_pass http://127.0.0.1:3001/api/ping;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /v1/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    ssl_certificate /etc/letsencrypt/live/shawnstronger.cloud/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/shawnstronger.cloud/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
    add_header Strict-Transport-Security "max-age=31536000" always;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.shawnstronger.cloud;

    ssl_certificate /etc/letsencrypt/live/shawnstronger.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shawnstronger.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    add_header Strict-Transport-Security "max-age=31536000" always;

    return 308 https://shawnstronger.cloud$request_uri;
}

server {
    listen 9528 ssl;
    listen [::]:9528 ssl;
    server_name shawnstronger.cloud www.shawnstronger.cloud;

    ssl_certificate /etc/letsencrypt/live/shawnstronger.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shawnstronger.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location = /_orbit_lx_auth {
        internal;
        proxy_pass http://127.0.0.1:3000/api/auth/me;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @orbit_lx_login {
        return 302 https://shawnstronger.cloud/?next=music;
    }

    location = / { return 404; }
    location = /index.html { return 404; }
    location ^~ /rest { return 404; }

    location ~ ^/api/user/(?:auth|list|login|logout|token|verify)(?:/|$) {
        return 404;
    }

    location ~ ^/(?:[^/]+/)?(?:ah|hello|id)$ {
        return 404;
    }

    location / {
        if ($http_upgrade != "") { return 404; }

        auth_request /_orbit_lx_auth;
        error_page 401 = @orbit_lx_login;

        proxy_pass http://127.0.0.1:9527;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_set_header Upgrade "";
        proxy_set_header Cookie "";
        proxy_set_header Authorization "";
        proxy_set_header X-User-Token "";
        proxy_set_header X-Frontend-Auth $http_x_frontend_auth;
        proxy_set_header X-Orbit-User "";
    }
}
